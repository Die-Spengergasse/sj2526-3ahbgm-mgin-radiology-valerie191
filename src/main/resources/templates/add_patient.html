<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patient registrieren</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<div class="container">
    <div class="page-header">
        <h1>Patient registrieren</h1>
        <p>Erfassung der Stammdaten für neue Patientinnen und Patienten.</p>
    </div>

    <div class="content">
        <p class="error" th:if="${error}" th:text="${error}"></p>

        <form th:action="@{/patient/add}" th:object="${patient}" method="post">
            <div class="form-grid">
                <div class="form-group">
                    <label>Sozialversicherungsnummer</label>
                    <input type="text" th:field="*{socialSecurityNumber}" required>
                </div>

                <div class="form-group">
                    <label>Geschlecht</label>
                    <select th:field="*{gender}" required>
                        <option value="">Bitte auswählen</option>
                        <option th:each="g : ${genders}" th:value="${g}" th:text="${g}"></option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Vorname</label>
                    <input type="text" th:field="*{firstName}" required>
                </div>

                <div class="form-group">
                    <label>Nachname</label>
                    <input type="text" th:field="*{lastName}" required>
                </div>

                <div class="form-group full-width">
                    <label>Geburtsdatum</label>
                    <input type="date" th:field="*{birthDate}" required>
                </div>
            </div>

            <div class="actions">
                <button type="submit">Patient speichern</button>
                <a class="btn-secondary" th:href="@{/}">Zurück zur Startseite</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
